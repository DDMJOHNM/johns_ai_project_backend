name: 'Deploy Backend to EC2'

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - '*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  GO_VERSION: '1.20'
  AWS_REGION: 'us-east-1'
  # Use EC2_INSTANCE_ID secret if set (Settings > Secrets > Actions). Otherwise tries CloudFormation, then fallback.
  EC2_INSTANCE_ID: 'i-0fbde8f1223e56d54'
  EC2_CF_STACK: 'johns-ai-backend-ec2'
  S3_BUCKET: 'duskaotearoa-terraform-state'

jobs:
  build-and-deploy:
    name: 'Build and Deploy Backend'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Tidy dependencies
        run: go mod tidy
      
      - name: Build binary for Linux
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o server ./cmd/server
          chmod +x server
      
      - name: Run tests
        run: go test -v ./...
      
      - name: Configure AWS credentials
        if: startsWith(github.ref, 'refs/tags/v')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Resolve and validate EC2 instance
        if: startsWith(github.ref, 'refs/tags/v')
        id: instance
        run: |
          set -e
          # Resolve instance ID: secret > CloudFormation > env default
          if [ -n "${{ secrets.EC2_INSTANCE_ID }}" ]; then
            INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
            echo "Using instance ID from EC2_INSTANCE_ID secret"
          elif CF_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.EC2_CF_STACK }} \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' \
            --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null) && [ -n "$CF_ID" ]; then
            INSTANCE_ID="$CF_ID"
            echo "Using instance ID from CloudFormation stack ${{ env.EC2_CF_STACK }}"
          else
            INSTANCE_ID="${{ env.EC2_INSTANCE_ID }}"
            echo "Using instance ID from workflow default"
          fi
          
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          
          # Validate instance exists and is running
          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "invalid")
          
          if [ "$STATE" != "running" ]; then
            echo "❌ EC2 instance $INSTANCE_ID is not reachable. State: ${STATE:-not found}"
            echo ""
            echo "Possible causes:"
            echo "  - Instance was terminated or replaced (new instances get new IDs)"
            echo "  - Wrong AWS account or region"
            echo "  - Instance is stopped"
            echo ""
            echo "Fix: Get the current instance ID from AWS Console or:"
            echo "  aws ec2 describe-instances --filters 'Name=tag:Name,Values=*john*backend*' --query 'Reservations[0].Instances[0].InstanceId' --output text"
            echo ""
            echo "Then add it as GitHub secret: Settings > Secrets > Actions > EC2_INSTANCE_ID"
            exit 1
          fi
          echo "✅ Instance $INSTANCE_ID is running"
      
      - name: Upload binary to S3
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          aws s3 cp server s3://${{ env.S3_BUCKET }}/backend-deployments/server-${{ github.sha }}
          aws s3 cp server s3://${{ env.S3_BUCKET }}/backend-deployments/server-latest
      
      - name: Deploy to EC2
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Send commands to EC2 via SSM
          aws ssm send-command \
            --instance-ids ${{ steps.instance.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "sudo systemctl stop john-ai-backend.service || true",
              "sudo aws s3 cp s3://${{ env.S3_BUCKET }}/backend-deployments/server-latest /opt/john-ai-project/server",
              "sudo chmod +x /opt/john-ai-project/server",
              "sudo chown ec2-user:ec2-user /opt/john-ai-project/server",
              "sudo systemctl start john-ai-backend.service",
              "sleep 5",
              "sudo systemctl status john-ai-backend.service --no-pager"
            ]' \
            --comment "Deploy backend version ${{ github.ref_name }}" \
            --output text \
            --query "Command.CommandId" > command_id.txt
          
          # Wait for command to complete
          COMMAND_ID=$(cat command_id.txt)
          echo "Waiting for deployment command: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id ${{ steps.instance.outputs.instance_id }} || true
          
          # Get full command output
          echo "=== Deployment Output ==="
          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id ${{ steps.instance.outputs.instance_id }} \
            --query "StandardOutputContent" \
            --output text
          
          # Check if service is running
          STATUS=$(aws ssm send-command \
            --instance-ids ${{ steps.instance.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["systemctl is-active john-ai-backend.service"]' \
            --output text \
            --query "Command.CommandId")
          
          sleep 5
          
          SERVICE_STATUS=$(aws ssm get-command-invocation \
            --command-id $STATUS \
            --instance-id ${{ steps.instance.outputs.instance_id }} \
            --query "StandardOutputContent" \
            --output text)
          
          if [ "$SERVICE_STATUS" != "active" ]; then
            echo "❌ Service failed to start"
            exit 1
          fi
          
          echo "✅ Service is running"
      
      - name: Health check (from inside EC2 via SSM)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Wait for service to fully start (DynamoDB connection, JWT fetch from SSM can be slow)
          sleep 20
          
          # Run health check FROM INSIDE the instance via SSM - avoids security group blocking public IP
          echo "Running health check via SSM (curl localhost:8080/health on EC2)..."
          HC_CMD=$(aws ssm send-command \
            --instance-ids ${{ steps.instance.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["curl -sf http://localhost:8080/health && echo HEALTH_OK || (echo HEALTH_FAIL; exit 1)"]' \
            --timeout-seconds 30 \
            --output text \
            --query "Command.CommandId")
          
          aws ssm wait command-executed --command-id $HC_CMD --instance-id ${{ steps.instance.outputs.instance_id }} || true
          sleep 2
          
          HC_OUTPUT=$(aws ssm get-command-invocation \
            --command-id $HC_CMD \
            --instance-id ${{ steps.instance.outputs.instance_id }} \
            --query "StandardOutputContent" \
            --output text 2>/dev/null || echo "")
          HC_STATUS=$(aws ssm get-command-invocation \
            --command-id $HC_CMD \
            --instance-id ${{ steps.instance.outputs.instance_id }} \
            --query "Status" \
            --output text 2>/dev/null || echo "Unknown")
          
          echo "Health check command status: $HC_STATUS"
          echo "Health check output: $HC_OUTPUT"
          
          if echo "$HC_OUTPUT" | grep -q "HEALTH_OK"; then
            echo "✅ Health check passed (server is running on EC2)"
          else
            echo "❌ Health check failed - fetching service logs..."
            LOG_CMD=$(aws ssm send-command \
              --instance-ids ${{ steps.instance.outputs.instance_id }} \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["sudo journalctl -u john-ai-backend.service -n 50 --no-pager"]' \
              --output text \
              --query "Command.CommandId")
            sleep 8
            aws ssm get-command-invocation \
              --command-id $LOG_CMD \
              --instance-id ${{ steps.instance.outputs.instance_id }} \
              --query "StandardOutputContent" \
              --output text || true
            exit 1
          fi
      
      - name: Notify deployment
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "🚀 Backend ${{ github.ref_name }} deployed successfully!"
          else
            echo "❌ Backend deployment failed!"
            exit 1
          fi

